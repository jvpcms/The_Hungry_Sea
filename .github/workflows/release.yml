name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: the-hungry-sea-linux.zip
            platform_grep: manylinux
          - os: windows-latest
            artifact: the-hungry-sea-windows.zip
            platform_grep: win
          - os: macos-latest
            artifact: the-hungry-sea-macos.zip
            platform_grep: macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: pip install panda3d setuptools

      - name: Build
        run: python setup.py bdist_apps

      - name: Package (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          PLATFORM_DIR=$(ls build | grep "${{ matrix.platform_grep }}" | head -1)
          cd build/$PLATFORM_DIR
          zip -r ../../${{ matrix.artifact }} .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dir = Get-ChildItem build | Where-Object { $_.Name -like '*${{ matrix.platform_grep }}*' } | Select-Object -First 1 -ExpandProperty Name
          Compress-Archive -Path "build\$dir\*" -DestinationPath "${{ matrix.artifact }}"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
