name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: the-hungry-sea-linux.zip
            platform_grep: manylinux
            build_platform: manylinux2014_x86_64
          - os: windows-latest
            artifact: the-hungry-sea-windows.zip
            platform_grep: win
            build_platform: win_amd64
          - os: macos-latest
            artifact: the-hungry-sea-macos.zip
            platform_grep: macos
            build_platform: macosx_10_9_x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: pip install panda3d setuptools

      - name: Build
        run: python setup.py bdist_apps
        env:
          BUILD_PLATFORM: ${{ matrix.build_platform }}

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          PLATFORM_DIR=$(ls build | grep "${{ matrix.platform_grep }}" | head -1)
          mkdir -p pkg/lib
          cp -r build/$PLATFORM_DIR/. pkg/lib/
          printf '#!/bin/bash\nDIR="$(cd "$(dirname "$0")" && pwd)"\ncd "$DIR/lib"\n./the-hungry-sea "$@"\n' > pkg/the-hungry-sea
          chmod +x pkg/the-hungry-sea
          cd pkg && zip -r ../${{ matrix.artifact }} .

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          PLATFORM_DIR=$(ls build | grep "${{ matrix.platform_grep }}" | head -1)
          cd build/$PLATFORM_DIR
          zip -r ../../${{ matrix.artifact }} .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dir = Get-ChildItem build | Where-Object { $_.Name -like '*${{ matrix.platform_grep }}*' } | Select-Object -First 1 -ExpandProperty Name
          New-Item -ItemType Directory -Path pkg\lib -Force
          Copy-Item -Recurse "build\$dir\*" "pkg\lib\"
          Set-Content -Path "pkg\the-hungry-sea.bat" -Value "@echo off`r`ncd /d `"%~dp0lib`"`r`nthe-hungry-sea.exe %*"
          Compress-Archive -Path "pkg\*" -DestinationPath "${{ matrix.artifact }}"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
